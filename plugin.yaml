name: calendar
version: 1.3.0
description: "A 'secretary book' calendar for Hermes — one-time & recurring events with reminders (ha_notify / ha_speak / chat / email), meeting details, per-occurrence status (floating/confirmed/missed/active) & reports, work timers with per-user single-timer enforcement and job/category time-tracking, EN/FR localized reminders, a per-user email registry, period plannings with completion stats + auto end-of-period email reports (with a styled PDF), daily digest, and job summary reports (calendar_list_jobs, calendar_job_summary). CRUD entirely through the agent; SQLite storage; read-only dashboard tab (Calendar | Plannings)."
author: local
kind: backend
optional_deps:
  - weasyprint   # PDF attachment for planning reports; falls back to text-only if missing
provides_tools:
  - calendar_add_event
  - calendar_update_event
  - calendar_remove_event
  - calendar_list_events
  - calendar_get_event
  - calendar_set_report
  - calendar_get_report
  - calendar_list_reports
  - calendar_set_status
  - calendar_start_timer
  - calendar_stop_timer
  - calendar_resume_job
  - calendar_log_job
  - calendar_set_user_email
  - calendar_list_user_emails
  - calendar_create_planning
  - calendar_list_plannings
  - calendar_get_planning
  - calendar_planning_report
  - calendar_remove_planning
  - calendar_digest
  - calendar_list_jobs
  - calendar_job_summary
  - calendar_add_note
  - calendar_list_notes
