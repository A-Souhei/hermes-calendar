name: calendar
version: 1.1.0
description: "A 'secretary book' calendar for Hermes — one-time & recurring events with reminders (ha_notify / ha_speak / chat / email), meeting details, per-occurrence status (floating/confirmed/missed/active) & reports, work timers, EN/FR localized reminders, a per-user email registry, and period plannings with completion stats + auto end-of-period email reports (with a styled PDF). CRUD entirely through the agent; SQLite storage; read-only dashboard tab (Calendar | Plannings)."
author: local
kind: backend
optional_deps:
  - weasyprint   # PDF attachment for planning reports; falls back to text-only if missing
provides_tools:
  - calendar_add_event
  - calendar_update_event
  - calendar_remove_event
  - calendar_list_events
  - calendar_get_event
  - calendar_set_report
  - calendar_get_report
  - calendar_list_reports
  - calendar_set_status
  - calendar_start_timer
  - calendar_stop_timer
  - calendar_set_user_email
  - calendar_list_user_emails
  - calendar_create_planning
  - calendar_list_plannings
  - calendar_get_planning
  - calendar_planning_report
  - calendar_remove_planning
