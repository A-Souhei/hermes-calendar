name: calendar
version: 1.0.0
description: "A 'secretary book' calendar for Hermes — one-time & recurring events with reminders that fire via ha_notify/ha_speak, plus rich meeting details (participants, room URL/app). CRUD entirely through the agent; SQLite storage. A read-only dashboard is added separately."
author: local
kind: backend
provides_tools:
  - calendar_add_event
  - calendar_update_event
  - calendar_remove_event
  - calendar_list_events
  - calendar_get_event
  - calendar_set_report
  - calendar_get_report
  - calendar_list_reports
